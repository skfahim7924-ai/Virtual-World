<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual World - Games</title>
    <link rel="stylesheet" href="css/menu-style.css">
    <style>
        /* শুধুমাত্র এই পেজের ব্যাকগ্রাউন্ড পরিবর্তনের জন্য */
        .games-body {
            background: url('assets/games.png') no-repeat center center/cover fixed !important;
        }
    </style>
</head>
<body class="menu-body games-body">
    <audio id="theme-song" loop>
        <source src="assets/theme.mp3" type="audio/mpeg">
    </audio>
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/logo.png" alt="Logo" class="nav-logo">
            <span class="nav-title">Virtual World - Games</span>
        </div>
        <ul class="nav-right">
            <li><a href="menu.html">Back to Menu</a></li>
        </ul>
    </nav>

    <main class="menu-container">
        <div class="card-grid">
            <a href="#" class="card" style="background-image: url('assets/battleground.png');">
                <div class="card-overlay"><span>Battleground Game</span></div>
            </a>
            
            <a href="#" class="card" style="background-image: url('assets/minigames.png');">
                <div class="card-overlay"><span>Mini Games</span></div>
            </a>
        </div>
    </main>

    <script src="js/menu-script.js"></script>
</body>
</html>
