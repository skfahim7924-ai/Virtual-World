<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual World - Menu</title>
    <link rel="stylesheet" href="css/menu-style.css">
</head>
<body class="menu-body">
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/logo.png" alt="Logo" class="nav-logo">
            <span class="nav-title">Virtual World</span>
        </div>
        <ul class="nav-right">
            <li><a href="menu.html">Home</a></li>
            <li class="dropdown">
                <a href="#">Explore ▼</a>
                <ul class="dropdown-content">

                    <li><a href="#">Apps</a></li>
                    <li><a href="#">AI</a></li>

                </ul>

            <li class="dropdown">

                <ul class="dropdown-content">

            <a href="#" class="card" style="background-image: url('assets/ai.png');">

            <a href="#" class="card" style="background-image: url('assets/more.png');">
